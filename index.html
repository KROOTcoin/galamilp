<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --obsidian: #0a0a08; --deep: #111109; --surface: #161610; --surface-2: #1d1d15;
    --border: rgba(212,175,55,0.12); --border-strong: rgba(212,175,55,0.28);
    --gold: #c9a84c; --gold-light: #e2c46a; --gold-dim: rgba(201,168,76,0.55);
    --gold-mist: rgba(201,168,76,0.07); --platinum: #eceae4; --silver: #a8a49c;
    --muted: #6a6760; --white: #f4f2ed;
    --red-dim: rgba(180,80,80,0.12); --red-border: rgba(180,80,80,0.22); --red-text: #c47a7a;
    --head: 'Poppins', sans-serif;
    --body: 'Archivo', sans-serif;
    --narrow: 'Archivo Narrow', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--body); background: var(--obsidian); color: var(--platinum); overflow-x: hidden; line-height: 1.6; }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    opacity: 0.35; mix-blend-mode: overlay;
  }

  /* TICKER */
  .ticker { background: var(--deep); border-bottom: 1px solid var(--border); height: 36px; display: flex; align-items: center; overflow: hidden; position: fixed; top: 0; left: 0; right: 0; z-index: 200; }
  .ticker-track { display: flex; gap: 48px; white-space: nowrap; animation: tick 35s linear infinite; font-size: 11px; font-family: var(--narrow); }
  .ti { display: flex; align-items: center; gap: 8px; color: var(--silver); }
  .ti strong { color: var(--platinum); }
  .up { color: #7ab87a; } .dn { color: var(--red-text); }
  @keyframes tick { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

  /* NAV */
  nav { position: fixed; top: 36px; left: 0; right: 0; z-index: 100; background: rgba(10,10,8,0.96); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 60px; height: 68px; display: flex; align-items: center; justify-content: space-between; }
  .nav-brand { display: flex; align-items: center; text-decoration: none; }
  .nav-logo-img { height: 34px; width: auto; display: block; object-fit: contain; }
  .footer-logo-img { height: 44px; width: auto; display: block; object-fit: contain; margin-bottom: 4px; }
  @media (max-width: 768px) { .nav-logo-img { height: 28px; } .footer-logo-img { height: 36px; } }
  .nav-name { font-family: var(--head); font-size: 15px; font-weight: 600; color: var(--white); }
  .nav-name span { color: var(--gold); }
  .nav-links { display: flex; align-items: center; gap: 32px; }
  .nav-links a { color: var(--silver); text-decoration: none; font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; transition: color 0.2s; font-family: var(--narrow); }
  .nav-links a:hover { color: var(--gold); }
  .nav-cta { border: 1px solid var(--gold-dim); color: var(--gold); padding: 10px 24px; font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; text-decoration: none; transition: all 0.25s; background: transparent; cursor: pointer; font-family: var(--narrow); }
  .nav-cta:hover { background: var(--gold); color: var(--obsidian); }
  @media (max-width: 900px) { .nav-links { display: none; } nav { padding: 0 24px; } }

  /* COMPLIANCE */
  .comp-bar { background: rgba(212,175,55,0.04); border-bottom: 1px solid var(--border); padding: 11px 60px; text-align: center; font-size: 11px; color: var(--muted); letter-spacing: 0.3px; position: relative; z-index: 1; margin-top: 104px; }
  @media (max-width: 768px) { .comp-bar { padding: 11px 24px; font-size: 10px; } }

  /* HERO */
  .hero { min-height: 100vh; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 80px 60px 90px; overflow: hidden; }
  .hero-grid { position: absolute; inset: 0; z-index: 0; background-image: linear-gradient(rgba(212,175,55,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(212,175,55,0.025) 1px, transparent 1px); background-size: 72px 72px; }
  .hero-glow { position: absolute; top: -20%; right: -15%; width: 800px; height: 800px; border-radius: 50%; background: radial-gradient(circle, rgba(212,175,55,0.055) 0%, transparent 65%); pointer-events: none; }
  .hero-glow2 { position: absolute; bottom: -15%; left: -10%; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(212,175,55,0.03) 0%, transparent 65%); pointer-events: none; }
  .hero-vline { position: absolute; top: 0; left: 220px; width: 1px; height: 100%; background: linear-gradient(to bottom, transparent, rgba(212,175,55,0.1), transparent); }
  .hero-content { position: relative; z-index: 1; max-width: 860px; }

  /* EYEBROW — same everywhere */
  .ey { display: flex; align-items: center; gap: 14px; margin-bottom: 26px; }
  .ey-line { width: 32px; height: 1px; background: var(--gold); flex-shrink: 0; }
  .ey span { font-size: 10px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); font-family: var(--narrow); }

  /* ALL H1-H3 use Poppins */
  h1, h2, h3, .prog-name, .form-title { font-family: var(--head) !important; }

  .hero h1 { font-size: clamp(48px, 7vw, 84px); font-weight: 300; line-height: 1.08; letter-spacing: -1.5px; color: var(--white); margin-bottom: 10px; }
  .hero h1 em { font-style: italic; color: var(--gold); font-weight: 300; }
  .hero-sub { font-size: clamp(14px, 1.8vw, 17px); color: var(--silver); line-height: 1.8; margin-bottom: 48px; max-width: 600px; font-weight: 300; }
  .hero-div { width: 52px; height: 1px; background: var(--border-strong); margin-bottom: 36px; }
  .hero-metrics { display: flex; gap: 52px; margin-bottom: 52px; flex-wrap: wrap; }
  .hm-num { font-family: var(--head); font-size: 30px; font-weight: 600; color: var(--gold); line-height: 1; }

  .btns { display: flex; gap: 14px; flex-wrap: wrap; }
  .btn-g { background: var(--gold); color: var(--obsidian); padding: 15px 36px; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; text-decoration: none; transition: all 0.25s; display: inline-block; border: 1px solid var(--gold); cursor: pointer; font-family: var(--narrow); }
  .btn-g:hover { background: var(--gold-light); border-color: var(--gold-light); }
  .btn-o { border: 1px solid var(--border-strong); color: var(--platinum); padding: 15px 36px; font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; text-decoration: none; transition: all 0.25s; display: inline-block; cursor: pointer; font-family: var(--narrow); background: transparent; }
  .btn-o:hover { border-color: var(--gold-dim); color: var(--gold); }
  .hero-disc { position: absolute; bottom: 36px; left: 60px; right: 60px; font-size: 10px; color: var(--muted); letter-spacing: 0.3px; border-top: 1px solid var(--border); padding-top: 16px; }
  @media (max-width: 768px) { .hero { padding: 60px 24px 90px; } .hero-disc { left: 24px; right: 24px; } .hero-vline { display: none; } }

  /* SHARED */
  section { position: relative; z-index: 1; }
  .si { max-width: 1160px; margin: 0 auto; padding: 96px 60px; }

  h2 { font-size: clamp(34px, 5vw, 56px); font-weight: 300; line-height: 1.1; color: var(--white); letter-spacing: -0.5px; margin-bottom: 20px; }
  h2 em { font-style: italic; color: var(--gold); font-weight: 300; }
  .sec-sub { font-size: 15px; color: var(--silver); line-height: 1.75; max-width: 580px; }

  /* ABOUT */
  #about { background: var(--deep); border-top: 1px solid var(--border); }
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; margin-top: 60px; }

  .about-text p strong { color: var(--platinum); font-weight: 500; }
  .cred-card { background: var(--surface); border: 1px solid var(--border); padding: 40px; position: relative; overflow: hidden; }

  .cred-title { font-family: var(--head); font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 26px; }

<section id="about">
  <div class="si">
    <div class="ey"><div class="ey-line"></div><span>Who We Are</span></div>
    <h2>Direct from Miner<br>to <em>Refinery</em></h2>
    <p class="sec-sub">A Dubai-based bullion company specialising in the procurement and supply of physical gold directly from African mining operations — with complete traceability at every stage of the supply chain.</p>
    <div class="about-grid">
      <div class="about-text">
        <p>Galami Gold is registered with the <strong>International Free Zone Authority (IFZA) in Dubai</strong>, operating as Galami FZCO. Our corporate structure spans three entities: Galami FZCO (Dubai HQ), <strong>Galami UK Ltd</strong> (European subsidiary, Covent Garden, London, WC2H 9JQ), and <strong>Roycroft Precious Metals Trading FZCO</strong> (Dubai Silicon Oasis — our bullion import and refining division).</p>
        <p>Our end-to-end supply chain ensures <strong>complete traceability and ethical sourcing</strong> — from vetted mining operations in West and Central Africa, through independent third-party assay and audit, through secure air cargo logistics, to licensed refineries in Dubai where bullion is processed to AU 999.9 purity under LBMA standards and traded on the spot market.</p>
        <p>Whether you are a private investor seeking portfolio diversification, a family office managing wealth across asset classes, or an institutional buyer requiring regular supply — Galami Gold delivers with precision and transparency. Every consignment is documented. Every audit is independent. Every investor receives full cycle reporting.</p>
        <p>Investor capital is deployed under a <strong>Loan Note Agreement with Galami UK Ltd</strong>, providing a clear, documented legal framework. Programs are structured as minimum 12-month rolling arrangements with exit available at the end of each active trade cycle.</p>
      </div>
      <div>

<section id="market">
  <div class="si">
    <div class="ey"><div class="ey-line"></div><span>Market Context</span></div>
    <h2>Why Physical Gold.<br><em>Why Now.</em></h2>
    <p class="sec-sub">Physical gold has preserved purchasing power across millennia. The structural conditions driving African-origin arbitrage margins remain intact — and in several key producing regions, are widening.</p>
    <div class="mkt-grid">
      <div class="mc"><div class="mc-num">I.</div><h3>Inflation Hedge</h3><p>Gold has preserved purchasing power across millennia. As central banks expand money supply, physical gold remains one of the few assets that cannot be inflated away — unlike paper currencies, its supply cannot be created by decree.</p></div>
      <div class="mc"><div class="mc-num">II.</div><h3>Portfolio Diversification</h3><p>Gold's low correlation with equities and bonds makes it an essential diversifier. Allocating 5–15% to physical gold has historically reduced overall portfolio volatility while maintaining long-term purchasing power.</p></div>
      <div class="mc"><div class="mc-num">III.</div><h3>Geopolitical Shelter</h3><p>In periods of geopolitical tension, capital flows to gold as a trusted store of value — a pattern repeated through every major crisis of the modern era. Physical gold held outside the banking system carries no counterparty risk.</p></div>
      <div class="mc"><div class="mc-num">IV.</div><h3>Direct Ownership</h3><p>Unlike ETFs or futures, Galami investors gain exposure to allocated physical gold — tangible, verifiable, and free from the counterparty risk inherent in financial derivatives and paper gold instruments.</p></div>
      <div class="mc"><div class="mc-num">V.</div><h3>The Dubai Advantage</h3><p>Dubai is the world's leading gold trading hub. Regulatory clarity, tax efficiency, and proximity to African supply chains makes it the optimal jurisdiction for physical bullion investment and refinery settlement.</p></div>
      <div class="mc"><div class="mc-num">VI.</div><h3>Direct Sourcing Margin</h3><p>With direct sourcing from African mining operations and a transparent fee structure, Galami investors gain exposure to gold at competitive rates unavailable through conventional retail or institutional channels.</p></div>
    </div>

  </div>
</section>

<!-- ═══ RISK ═══ -->
<section id="risk">
  <div class="si">
    <div class="ey"><div class="ey-line"></div><span>Risk Framework</span></div>
    <h2>We Do Not Manage<br><em>Away</em> Risk. We Structure It.</h2>
    <p class="sec-sub">All physical commodity trading carries risk. Our role is to identify, quantify, and structurally mitigate each material risk within the trading cycle — and to be transparent with investors about where risk remains.</p>
    <div class="risk-intro"><strong>Important:</strong> The following describes risk controls as designed and intended to operate. The presence of a risk control does not eliminate the underlying risk. Market conditions, counterparty behaviour, regulatory changes, and logistics factors can all produce outcomes that deviate from projections. Investors should read the full Risk Disclosure document prior to committing capital.</div>
    <div class="risk-grid">
      <div class="rc"><div class="rc-head"><div class="rc-dot"></div><h3>Counterparty Risk</h3></div><p>All suppliers are subject to formal KYC/AML screening and ongoing due diligence. The assay-gated payment structure ensures the majority of capital is deployed only against verified physical metal. Loan Note Agreements with Galami UK Ltd provide a documented legal framework for all investor capital.</p></div>
      <div class="rc"><div class="rc-head"><div class="rc-dot"></div><h3>Metal Authenticity Risk</h3></div><p>Independent third-party assay is mandatory before any consignment is authorised for shipment. Assay certificates confirm purity and weight to AU 999.9 standard. No shipment proceeds without verified results. This process is non-negotiable across both programs and cannot be bypassed.</p></div>
      <div class="rc"><div class="rc-head"><div class="rc-dot"></div><h3>Logistics and Transit Risk</h3></div><p>Physical gold in transit is covered by cargo insurance for full declared value. Chain of custody documentation is maintained throughout. All transit is via licensed secure air cargo operators. Roycroft PMT manages Dubai reception and the refinery interface at Dubai Silicon Oasis.</p></div>
      <div class="rc"><div class="rc-head"><div class="rc-dot"></div><h3>Gold Price Risk</h3></div><p>Trading margin is generated from the spread between origin price and refinery sale price. A decline in gold spot during the bi-weekly cycle would compress absolute margin. Investors should note that adverse price movements can reduce or eliminate the trading margin in any given cycle.</p></div>
      <div class="rc"><div class="rc-head"><div class="rc-dot"></div><h3>Regulatory and Export Risk</h3></div><p>We operate exclusively through licensed export channels in Zambia and Guinea, with full compliance documentation. Our compliance team monitors regulatory developments in source markets continuously. Regulatory change is a material risk in this sector and is disclosed accordingly.</p></div>
      <div class="rc"><div class="rc-head"><div class="rc-dot"></div><h3>Liquidity Risk</h3></div><p>Capital committed to a trade cycle is not accessible during the active cycle period. Both programs require a minimum 12-month rolling commitment with exit available only at cycle end. There is no secondary market for investor positions. These programs are appropriate only for investors who can tolerate the defined illiquidity window.</p></div>
    </div>
    <div class="risk-disc">
      <h4>Principal Risk Disclosure</h4>
      <p>Galami Gold investment programs are not regulated by the Financial Conduct Authority (FCA) and are not covered by the Financial Services Compensation Scheme (FSCS). All target return figures are projections based on structured trade cycle performance — they are not guarantees. Capital is at risk. Past performance of any trade cycle is not indicative of future results. Investors may receive back less than the amount deployed. These programs are directed exclusively at high-net-worth individuals and sophisticated investors who have the knowledge, experience, and financial capacity to evaluate and bear the risks involved. Nothing in this communication constitutes regulated financial advice or a solicitation to invest. Investors are strongly encouraged to seek independent legal and financial advice before committing capital.</p>
    </div>
  </div>
</section>
